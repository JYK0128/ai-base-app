apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: monitoring
data:
  mimir.yaml: |
    multitenancy_enabled: false
    server:
      http_listen_port: 8080
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/blocks
      tsdb:
        dir: /data/mimir/tsdb
    compactor:
      data_dir: /data/mimir/compactor
    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    ingester:
      ring:
        instance_addr: 127.0.0.1
        replication_factor: 1
        kvstore:
          store: inmemory
    store_gateway:
      sharding_ring:
        replication_factor: 1
    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/rules
    ruler:
      enable_api: true
      rule_path: /tmp/mimir/rules
      ring:
        kvstore:
          store: inmemory
