apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mimir-sts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mimir
    app.kubernetes.io/part-of: ai-base-app
spec:
  serviceName: "mimir"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mimir
        image: grafana/mimir:2.12.0
        workingDir: /tmp
        args:
        - "-config.file=/etc/mimir/mimir.yaml"
        - "-target=all"
        ports:
        - containerPort: 8080
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: config
          mountPath: /etc/mimir
        - name: data
          mountPath: /data/mimir
        - name: alert-rules
          mountPath: /data/mimir/rules/anonymous
          readOnly: true
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: mimir-cm
      - name: alert-rules
        configMap:
          name: monitoring-alerts-cm
          items:
          - key: monitoring-rules.yaml
            path: monitoring-rules.yaml
      - name: tmp
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 20Gi
