apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mimir-sts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: mimir
spec:
  serviceName: "mimir"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mimir
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mimir
    spec:
      containers:
      - name: mimir-sts
        image: grafana/mimir:2.10.4
        imagePullPolicy: IfNotPresent
        args:
        - "-config.file=/etc/mimir/mimir.yaml"
        ports:
        - containerPort: 8080
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 15
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: config
          mountPath: /etc/mimir
        - name: data
          mountPath: /data
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: mimir-cm
      - name: tmp
        emptyDir: {}
      - name: data
        emptyDir: {}
