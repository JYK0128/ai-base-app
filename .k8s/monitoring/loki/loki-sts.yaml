apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki-sts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki
spec:
  serviceName: "loki"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
    spec:
      containers:
      - name: loki-sts
        image: grafana/loki:3
        imagePullPolicy: IfNotPresent
        args:
        - "-config.file=/etc/loki/loki.yaml"
        - "-validation.allow-structured-metadata=false"
        ports:
        - containerPort: 3100
        readinessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 3100
          initialDelaySeconds: 30
          periodSeconds: 15
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: data
          mountPath: /loki
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: loki-cm
      - name: tmp
        emptyDir: {}
      - name: data
        emptyDir: {}
