apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cm
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  infra-overview.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": "-- Grafana --",
            "enable": true,
            "hide": true,
            "iconColor": "rgba(255, 99, 132, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "content": "
          "gridPos": { "h": 6, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "mode": "markdown",
          "title": "Status",
          "type": "text"
        }
      ],
      "schemaVersion": 30,
      "style": "dark",
      "tags": ["automated"],
      "templating": { "list": [] },
      "time": { "from": "now-6h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "Cluster Overview (Automated Load)",
      "uid": "infra-auto",
      "version": 1
    }
