apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: grafana-sts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  serviceName: "grafana"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      containers:
      - name: grafana-sts
        image: public.ecr.aws/bitnami/grafana:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "true"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: Admin
        - name: GF_PATHS_PROVISIONING
          value: "/etc/grafana/provisioning"
        volumeMounts:
        - name: data
          mountPath: /bitnami/grafana
        - name: tmp
          mountPath: /tmp
        - name: datasources
          mountPath: /etc/grafana/provisioning/datasources
          readOnly: true
        - name: dashboards-provisioning
          mountPath: /etc/grafana/provisioning/dashboards
          readOnly: true
      volumes:
      - name: tmp
        emptyDir: {}
      - name: datasources
        configMap:
          name: grafana-datasources-cm
      - name: dashboards-provisioning
        configMap:
          name: grafana-provisioning-cm
      - name: sc-dashboard-volume # 사이드카는 제거했지만 마운트 해제 누락 방지를 위해 유지 또는 제거 가능
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 5Gi
