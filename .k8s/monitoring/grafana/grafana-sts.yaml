apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: grafana-sts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana
spec:
  serviceName: "grafana"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
      - name: grafana
        image: grafana/grafana:10.2.1
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: GF_PATHS_PROVISIONING
          value: /etc/grafana/provisioning
        volumeMounts:
        - name: config
          mountPath: /etc/grafana/provisioning
        - name: data
          mountPath: /var/lib/grafana
      volumes:
      - name: config
        configMap:
          name: grafana-provisioning-cm
      - name: data
        emptyDir: {}
