apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail-ds
  namespace: monitoring
  labels:
    app.kubernetes.io/name: promtail
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
    spec:
      serviceAccountName: promtail
      # 보안 표준화: 비루트 권한 적용 (Promtail은 로그를 읽어야 하므로 UID 확인 필요)
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      containers:
      - name: promtail-ds
        image: grafana/promtail:latest
        args:
        - "-config.file=/etc/promtail/promtail.yaml"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - DAC_READ_SEARCH # 로그 파일을 읽기 위한 최소 권한
        volumeMounts:
        - name: logs
          mountPath: /var/log/pods
          readOnly: true
        - name: config
          mountPath: /etc/promtail
      volumes:
      - name: logs
        hostPath:
          path: /var/log/pods
      - name: config
        configMap:
          name: promtail-cm
