apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      # 보안 표준화: 비루트 권한 적용 (Promtail은 로그를 읽어야 하므로 UID 확인 필요)
      securityContext:
        runAsNonRoot: true
        runAsUser: 0 # 잠시만요, Promtail은 /var/log를 읽어야 하므로 보통 root 권한이 필요할 수 있습니다. 
                     # 일단 capabilities drop을 최대한 적용하겠습니다.
      containers:
      - name: promtail
        image: grafana/promtail:latest
        args:
        - "-config.file=/etc/promtail/promtail.yaml"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - DAC_READ_SEARCH # 로그 파일을 읽기 위한 최소 권한
        volumeMounts:
        - name: logs
          mountPath: /var/log/pods
          readOnly: true
        - name: config
          mountPath: /etc/promtail
      volumes:
      - name: logs
        hostPath:
          path: /var/log/pods
      - name: config
        configMap:
          name: promtail-config
