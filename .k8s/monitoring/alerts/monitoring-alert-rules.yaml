apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-alert-rules
  namespace: monitoring
data:
  monitoring-rules.yaml: |
    groups:
      - name: monitoring-stack-health
        rules:
          - alert: MonitoringComponentDown
            expr: up{namespace="monitoring",job=~"loki|mimir|tempo|kafka-exporter"} == 0
            for: 3m
            labels:
              severity: warning
            annotations:
              summary: "Monitoring component is down"
              description: "{{ $labels.job }} in namespace {{ $labels.namespace }} has been down for more than 3 minutes."

          - alert: KafkaExporterNoMetrics
            expr: absent(kafka_brokers)
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Kafka exporter metrics missing"
              description: "kafka-exporter has not exposed kafka_brokers metric for over 5 minutes."

          - alert: MimirHighErrorRate
            expr: |
              (
                sum(rate(cortex_request_duration_seconds_count{namespace="monitoring",status_code=~"5.."}[5m]))
                /
                clamp_min(sum(rate(cortex_request_duration_seconds_count{namespace="monitoring"}[5m])), 1)
              ) > 0.05
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Mimir 5xx error ratio is high"
              description: "Mimir 5xx ratio exceeded 5% over the last 10 minutes."

          - alert: LokiIngestionMissing
            expr: absent(rate(loki_distributor_lines_received_total[5m]))
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Loki ingestion metrics missing"
              description: "No loki_distributor_lines_received_total samples were observed in the last 10 minutes."

          - alert: TempoSpansMissing
            expr: absent(rate(tempo_distributor_spans_received_total[5m]))
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Tempo spans metrics missing"
              description: "No tempo_distributor_spans_received_total samples were observed in the last 10 minutes."
