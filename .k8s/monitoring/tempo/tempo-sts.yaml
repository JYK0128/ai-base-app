apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo-sts
  namespace: monitoring
  labels:
    app.kubernetes.io/name: tempo
spec:
  serviceName: "tempo"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tempo
    spec:
      containers:
      - name: tempo-sts
        image: public.ecr.aws/bitnami/grafana-tempo:latest
        imagePullPolicy: IfNotPresent
        args:
        - "-config.file=/etc/tempo/tempo.yaml"
        ports:
        - containerPort: 3200   # HTTP
        - containerPort: 4317   # OTLP gRPC
        readinessProbe:
          httpGet:
            path: /ready
            port: 3200
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ready
            port: 3200
          initialDelaySeconds: 40
          periodSeconds: 15
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/tempo
        - name: data
          mountPath: /var/tempo
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: config
        configMap:
          name: tempo-cm
      - name: tmp
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
