apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../apps
  - ../../database
  - ../../messaging
  - ../../monitoring
  - ../../networking
  - monitoring-namespace.yaml
  - prod-service-namespace.yaml
  - prod-infra-namespace.yaml
  - prod-web-namespace.yaml
  - platform-gateway-hpa.yaml
  - platform-gateway-pdb.yaml
  - platform-auth-service-hpa.yaml
  - platform-auth-service-pdb.yaml
  - platform-core-service-hpa.yaml
  - platform-core-service-pdb.yaml
  - platform-admin-web-hpa.yaml
  - platform-admin-web-pdb.yaml
  - postgres-backup-cronjob.yaml
  - postgres-backup-pvc.yaml

labels:
  - pairs:
      env: prod

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: postgres-secret
    namespace: dev-infra
    behavior: replace
    envs:
      - secrets/postgres-secret.env
  - name: rabbitmq-secret
    namespace: dev-infra
    behavior: replace
    envs:
      - secrets/rabbitmq-secret.env
    files:
      - default_user.conf=secrets/rabbitmq-default-user.conf
  - name: redis-secret
    namespace: dev-infra
    behavior: replace
    envs:
      - secrets/redis-secret.env
  - name: platform-auth-service-secret
    namespace: dev-service
    behavior: replace
    envs:
      - secrets/platform-auth-service-secret.env
  - name: platform-gateway-secret
    namespace: dev-web
    behavior: replace
    envs:
      - secrets/platform-gateway-secret.env
  - name: platform-core-service-secret
    namespace: dev-service
    behavior: replace
    envs:
      - secrets/platform-core-service-secret.env

replacements:
  - source:
      kind: Namespace
      name: prod-web
      fieldPath: metadata.name
    targets:
      - select:
          namespace: dev-web
        fieldPaths:
          - metadata.namespace
        options:
          create: true
  - source:
      kind: Namespace
      name: prod-service
      fieldPath: metadata.name
    targets:
      - select:
          namespace: dev-service
        fieldPaths:
          - metadata.namespace
        options:
          create: true
  - source:
      kind: Namespace
      name: prod-infra
      fieldPath: metadata.name
    targets:
      - select:
          namespace: dev-infra
        fieldPaths:
          - metadata.namespace
        options:
          create: true

patches:
  # ===== platform-gateway =====
  - target:
      kind: Deployment
      name: platform-gateway-deploy
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: platform-gateway
                env: prod
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: platform-gateway
                      env: prod
  - target:
      kind: ConfigMap
      name: platform-gateway-cm
    patch: |-
      - op: replace
        path: /data/AUTH_SERVICE_URL
        value: platform-auth-service.prod-service.svc.cluster.local:3001
      - op: replace
        path: /data/CORE_SERVICE_URL
        value: platform-core-service.prod-service.svc.cluster.local:3005
      - op: replace
        path: /data/NODE_ENV
        value: production
  - target:
      kind: Gateway
      name: platform-gateway-gw
    patch: |-
      - op: replace
        path: /spec/servers/0/hosts
        value: ["your-domain.com", "*.your-domain.com"]
  - target:
      kind: VirtualService
      name: platform-gateway-vs
    patch: |-
      - op: replace
        path: /spec/hosts
        value: ["your-domain.com"]

  # ===== platform-auth-service =====
  - target:
      kind: Deployment
      name: platform-auth-service-deploy
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: platform-auth-service
                env: prod
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: platform-auth-service
                      env: prod
  - target:
      kind: ConfigMap
      name: platform-auth-service-cm
    patch: |-
      - op: replace
        path: /data/NODE_ENV
        value: production

  # ===== platform-core-service =====
  - target:
      kind: Deployment
      name: platform-core-service-deploy
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: platform-core-service
                env: prod
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: platform-core-service
                      env: prod
  - target:
      kind: ConfigMap
      name: platform-core-service-cm
    patch: |-
      - op: replace
        path: /data/NODE_ENV
        value: production

  # ===== platform-admin-web =====
  - target:
      kind: Deployment
      name: platform-admin-web-deploy
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: platform-admin-web
                env: prod
      - op: add
        path: /spec/template/spec/affinity
        value:
          podAntiAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  topologyKey: kubernetes.io/hostname
                  labelSelector:
                    matchLabels:
                      app.kubernetes.io/name: platform-admin-web
                      env: prod

  # ===== Infrastructure =====
  - target:
      kind: Cluster
      name: postgres
    patch: |-
      - op: replace
        path: /spec/instances
        value: 3
      - op: replace
        path: /spec/storage/size
        value: 20Gi
  - target:
      kind: RedisCluster
      name: redis
    patch: |-
      - op: replace
        path: /spec/clusterSize
        value: 3
  - target:
      kind: RabbitmqCluster
      name: rabbitmq
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 3
      - op: replace
        path: /spec/persistence/storage
        value: 20Gi
      - op: replace
        path: /spec/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/resources/requests/memory
        value: 1Gi
      - op: replace
        path: /spec/resources/limits/cpu
        value: "1"
      - op: replace
        path: /spec/resources/limits/memory
        value: 2Gi

  # ===== NetworkPolicies Cross-Namespace Updates =====
  - target:
      kind: NetworkPolicy
      name: egress-gateway-to-services
    patch: |-
      - op: replace
        path: /spec/egress/0/to/0/namespaceSelector/matchLabels/kubernetes.io~1metadata.name
        value: prod-service
  - target:
      kind: NetworkPolicy
      name: ingress-services-from-gateway
    patch: |-
      - op: replace
        path: /spec/ingress/0/from/0/namespaceSelector/matchLabels/kubernetes.io~1metadata.name
        value: prod-web
  - target:
      kind: NetworkPolicy
      name: egress-services-to-infra
    patch: |-
      - op: replace
        path: /spec/egress/0/to/0/namespaceSelector/matchLabels/kubernetes.io~1metadata.name
        value: prod-infra
  - target:
      kind: NetworkPolicy
      name: ingress-postgres-from-services
    patch: |-
      - op: replace
        path: /spec/ingress/0/from/0/namespaceSelector/matchLabels/kubernetes.io~1metadata.name
        value: prod-service
  - target:
      kind: NetworkPolicy
      name: ingress-redis-from-services
    patch: |-
      - op: replace
        path: /spec/ingress/0/from/0/namespaceSelector/matchLabels/kubernetes.io~1metadata.name
        value: prod-service

  # ===== Monitoring: switch emptyDir to PVC for persistence =====
  - target:
      kind: StatefulSet
      name: loki-sts
    patch: |-
      - op: remove
        path: /spec/template/spec/volumes/2
      - op: add
        path: /spec/volumeClaimTemplates
        value:
          - metadata:
              name: data
            spec:
              accessModes: [ "ReadWriteOnce" ]
              resources:
                requests:
                  storage: 10Gi
  - target:
      kind: StatefulSet
      name: tempo-sts
    patch: |-
      - op: remove
        path: /spec/template/spec/volumes/2
      - op: add
        path: /spec/volumeClaimTemplates
        value:
          - metadata:
              name: data
            spec:
              accessModes: [ "ReadWriteOnce" ]
              resources:
                requests:
                  storage: 10Gi
  - target:
      kind: StatefulSet
      name: mimir-sts
    patch: |-
      - op: remove
        path: /spec/template/spec/volumes/2
      - op: add
        path: /spec/volumeClaimTemplates
        value:
          - metadata:
              name: data
            spec:
              accessModes: [ "ReadWriteOnce" ]
              resources:
                requests:
                  storage: 10Gi
  - target:
      kind: StatefulSet
      name: grafana-sts
    patch: |-
      - op: remove
        path: /spec/template/spec/volumes/1
      - op: add
        path: /spec/volumeClaimTemplates
        value:
          - metadata:
              name: data
            spec:
              accessModes: [ "ReadWriteOnce" ]
              resources:
                requests:
                  storage: 5Gi
