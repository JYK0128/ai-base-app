apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: platform-admin-web-hpa
  namespace: prod-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: platform-admin-web-deploy
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
