apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# [진짜 대통합] 모든 리소스를 여기서 한 번에 관리합니다.
resources:
  # 1. Namespaces & Policies (기초 공사)
  - ../../namespaces
  - ../../network-policies
  
  # 2. Apps (핵심 비즈니스)
  - ../../apps/service-gateway
  - ../../apps/platform-auth-service
  
  # 3. Infra (DB / Messaging)
  - ../../database/postgres
  - ../../database/redis
  - ../../messaging/rabbitmq
  - ../../messaging/kafka
  
  # 4. Monitoring (LGTM Stack)
  - ../../monitoring/loki
  - ../../monitoring/mimir
  - ../../monitoring/tempo
  - ../../monitoring/grafana
  - ../../monitoring/promtail
  
  # 5. Networking (Istio)
  - ../../networking

commonLabels:
  env: dev

patches:
  - target:
      kind: Deployment
      labelSelector: "app in (service-gateway, platform-auth-service)"
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
