apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# 1. 공통 리소스 정의
resources:
  - ../../namespaces
  - ../../network-policies
  - ../../apps
  - ../../database
  - ../../messaging
  - ../../monitoring
  - ../../networking

# 2. 공통 라벨 주입
labels:
  - includeSelectors: true
    pairs:
      env: dev

# 3. 개발 환경 최적화 패치 (Diet & Ephemeral)
patches:
  
  # --- [SECTION 1: RESOURCE DIET] ---

  # 어플리케이션 복제본 1개로 축소
  - target:
      kind: Deployment
      labelSelector: "app.kubernetes.io/name in (service-gateway, platform-auth-service)"
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

  # Postgres 인스턴스 축소 및 백업 기능 제거
  - target:
      kind: Cluster
      name: postgres
    patch: |-
      - op: replace
        path: /spec/instances
        value: 1
      - op: remove
        path: /spec/backup

  # RabbitMQ 복제본 축소 및 영속성(Persistence) 제거
  - target:
      kind: RabbitmqCluster
      name: rabbitmq
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: remove
        path: /spec/persistence

  # Redis 클러스터 크기 축소
  - target:
      kind: RedisCluster
      name: redis
    patch: |-
      - op: replace
        path: /spec/clusterSize
        value: 1

  # Kafka 복제본 축소
  - target:
      kind: Kafka
      name: kafka
    patch: |-
      - op: replace
        path: /spec/kafka/replicas
        value: 1

  # HPA 최소 복제본 1개로 고정
  - target:
      kind: HorizontalPodAutoscaler
      labelSelector: "app.kubernetes.io/name in (service-gateway, platform-auth-service)"
    patch: |-
      - op: replace
        path: /spec/minReplicas
        value: 1

  # --- [SECTION 2: EPHEMERAL STORAGE (휘발성 환경)] ---

  # 모니터링 모든 컴포넌트의 PVC(volumeClaimTemplates) 제거
  - target:
      kind: StatefulSet
      labelSelector: "app.kubernetes.io/name in (loki, mimir, tempo, grafana)"
    patch: |-
      - op: remove
        path: /spec/volumeClaimTemplates

  # Loki 볼륨 구성: emptyDir 사용
  - target:
      kind: StatefulSet
      name: loki-sts
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes
        value:
          - name: config
            configMap:
              name: loki-cm
          - name: tmp
            emptyDir: {}
          - name: data
            emptyDir: {}
            
  # Mimir 볼륨 구성: emptyDir 및 얼럿 규칙 CM 연결
  - target:
      kind: StatefulSet
      name: mimir-sts
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes
        value:
          - name: config
            configMap:
              name: mimir-cm
          - name: alert-rules
            configMap:
              name: monitoring-alerts-cm
              items:
                - key: monitoring-rules.yaml
                  path: monitoring-rules.yaml
          - name: tmp
            emptyDir: {}
          - name: data
            emptyDir: {}

  # Tempo 볼륨 구성: emptyDir 사용
  - target:
      kind: StatefulSet
      name: tempo-sts
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes
        value:
          - name: config
            configMap:
              name: tempo-cm
          - name: tmp
            emptyDir: {}
          - name: data
            emptyDir: {}

  # Grafana 구성: 사이드카 컨테이너 제거 및 볼륨을 emptyDir로 전환
  - target:
      kind: StatefulSet
      name: grafana-sts
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes
        value:
          - name: tmp
            emptyDir: {}
          - name: datasources
            configMap:
              name: grafana-datasources-cm
          - name: dashboards-provisioning
            configMap:
              name: grafana-provisioning-cm
          - name: data
            emptyDir: {}
