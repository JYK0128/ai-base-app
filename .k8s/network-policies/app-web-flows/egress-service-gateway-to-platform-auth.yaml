apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-service-gateway-to-platform-auth
  namespace: dev-web
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: service-gateway
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dev-api
      podSelector:
        matchLabels:
          app.kubernetes.io/name: platform-auth-service
    ports:
    - protocol: TCP
      port: 3001
