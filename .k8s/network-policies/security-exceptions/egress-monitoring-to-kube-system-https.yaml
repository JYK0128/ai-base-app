apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-monitoring-to-kube-system-https
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 443
