apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ingress-platform-auth-from-service-gateway
  namespace: dev-api
spec:
  podSelector:
    matchLabels:
      app: platform-auth-service
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dev-web
      podSelector:
        matchLabels:
          app: service-gateway
    ports:
    - protocol: TCP
      port: 3000
