apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-platform-auth-to-redis
  namespace: dev-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: platform-auth-service
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: dev-infra
    ports:
    - protocol: TCP
      port: 6379
