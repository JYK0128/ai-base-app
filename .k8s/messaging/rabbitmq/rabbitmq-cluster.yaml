apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
  namespace: dev-infra
spec:
  replicas: 1
  secretBackend:
    externalSecret:
      name: rabbitmq-secret
  image: public.ecr.aws/docker/library/rabbitmq:4-management
  persistence:
    storage: "0"
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
