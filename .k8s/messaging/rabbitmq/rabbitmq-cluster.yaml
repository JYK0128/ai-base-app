apiVersion: rabbitmq.com/v1beta1
kind: RabbitmqCluster
metadata:
  name: rabbitmq
  namespace: dev-infra
spec:
  replicas: 3 # "오퍼레이터가 자동 클러스터링 수행"
  
  # 정적 계정 정보 사용 (RABBITMQ_DEFAULT_USER, PASS)
  secretBackend:
    externalSecret:
      name: rabbitmq-secret
  
  rabbitmq:
    additionalConfig: |
      cluster_partition_handling = pause_minority
      vm_memory_high_watermark_paging_ratio = 0.99
    
  # 이미지 및 리소스 설정
  image: public.ecr.aws/bitnami/rabbitmq@sha256:1b0b2dd8fcbb3883c1e951d47606f7c0d4d1b9ac08a799bc9da63103aa414726
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1000m
      memory: 2Gi

  # 영속성 설정
  persistence:
    storage: 10Gi
