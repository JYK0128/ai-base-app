apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: dev-infra
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: ai-base-app
    strimzi.io/cluster: kafka-cluster
spec:
  replicas: 1 # dev 단일 운영을 위한 축소
  roles:
    - broker
    - controller
  storage:
    type: jbod
    volumes:
    - id: 0
      type: persistent-claim
      size: 20Gi
      deleteClaim: false
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: dev-infra
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: ai-base-app
spec:
  kafka:
    version: 3.6.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
      inter.broker.protocol.version: "3.6"
    metadataVersion: "3.6-IV2"
  entityOperator:
    topicOperator: {}
    userOperator: {}
