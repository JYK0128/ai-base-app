apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  namespace: dev-infra
spec:
  instances: 1
  bootstrap:
    initdb:
      database: platform_db
      owner: postgres
      secret:
        name: postgres-secret
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 5Gi
