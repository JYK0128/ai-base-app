apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: dev-infra
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: postgres-backup
            image: postgres:17
            imagePullPolicy: IfNotPresent
            command: ["/bin/sh", "-c"]
            args:
            - |
              set -e
              DATE=$(date +%Y%m%d_%H%M%S)
              FILENAME="/backups/postgres_backup_${DATE}.sql.gz"
              echo "Starting backup to ${FILENAME}..."
              pg_dump -h postgres-service -U ${POSTGRES_USER} ${POSTGRES_DB} | gzip > ${FILENAME}
              echo "Backup completed successfully."
              echo "Cleaning up old backups..."
              find /backups -name "postgres_backup_*.sql.gz" -mtime +7 -delete
              echo "Cleanup done."
            envFrom:
            - secretRef:
                name: postgres-secret
            - configMapRef:
                name: postgres-config
            volumeMounts:
            - name: backup-volume
              mountPath: /backups
          restartPolicy: OnFailure
          volumes:
          - name: backup-volume
            persistentVolumeClaim:
              claimName: postgres-backup-pvc
