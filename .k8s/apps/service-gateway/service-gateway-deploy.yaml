apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-gateway-deploy
  namespace: dev-web
  labels:
    app.kubernetes.io/name: service-gateway
    app.kubernetes.io/part-of: ai-base-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: service-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service-gateway
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: service-gateway
              topologyKey: "kubernetes.io/hostname"
      containers:
      - name: service-gateway
        image: service-gateway:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        envFrom:
        - configMapRef:
            name: service-gateway-cm
        ports:
        - containerPort: 3000
        startupProbe:
          httpGet:
            path: /health/live
            port: 3000
          periodSeconds: 5
          failureThreshold: 24
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3000
          periodSeconds: 15
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3000
          periodSeconds: 10
          failureThreshold: 3
      volumes:
      - name: tmp
        emptyDir: {}
