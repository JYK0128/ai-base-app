apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-auth-service-cm
  namespace: dev-service
  labels:
    app.kubernetes.io/name: platform-auth-service
    app.kubernetes.io/part-of: ai-base-app
data:
  NODE_ENV: "development"
  PORT: "3000"
  TCP_PORT: "3001"
  JWT_ACCESS_EXPIRES_IN: "600"
  JWT_REFRESH_EXPIRES_IN: "3600"
  LOGIN_MAX_ATTEMPTS: "5"
  LOGIN_ATTEMPT_TTL: "300"
  LOGIN_LOCK_TTL: "1800"
