apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-gateway-deploy
  namespace: dev-web
  labels:
    app.kubernetes.io/name: platform-gateway
    app.kubernetes.io/part-of: ai-base-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: platform-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: platform-gateway
    spec:
      containers:
      - name: platform-gateway
        image: platform-gateway:latest
        imagePullPolicy: IfNotPresent
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        envFrom:
        - configMapRef:
            name: platform-gateway-cm
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 300m
            memory: 256Mi
        readinessProbe:
          tcpSocket:
            port: 3000
        livenessProbe:
          tcpSocket:
            port: 3000
      volumes:
      - name: tmp
        emptyDir: {}
